services:
  postgres:
    image: postgres:16
    container_name: cidadeativa-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cidadeativa}
      POSTGRES_USER: ${POSTGRES_USER:-cidadeativa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cidadeativa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
