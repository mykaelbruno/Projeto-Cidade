services:
  postgres:
    image: postgres:16-alpine
    container_name: cidadeativa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cidadeativa}
      POSTGRES_USER: ${POSTGRES_USER:-cidadeativa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cidadeativa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cidadeativa} -d ${POSTGRES_DB:-cidadeativa}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cidadeativa

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cidadeativa-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cidadeativa}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-cidadeativa}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-cidadeativa}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DENUNCIA_ANEXOS_DIR: /app/uploads/denuncias
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - cidadeativa

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: cidadeativa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - cidadeativa

volumes:
  postgres_data:
  backend_uploads:

networks:
  cidadeativa:
    driver: bridge
